<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D球体抽奖系统</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf, #ff0080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.3)); }
            to { filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.6)); }
        }

        .header p {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 212, 255, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ff0080);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .import-panel {
            position: absolute;
            top: 150px;
            right: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 320px;
            pointer-events: auto;
        }

        .import-panel h3 {
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 1.1rem;
        }

        .import-panel textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .import-panel textarea:focus {
            border-color: #00d4ff;
        }

        .import-panel .hint {
            margin-top: 10px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .result-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-display.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .result-display .winner-text {
            font-size: 0.9rem;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .result-display .winner-name {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff0080, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
        }

        .count-display {
            position: absolute;
            top: 20px;
            left: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px 20px;
            pointer-events: auto;
        }

        .count-display .label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .count-display .number {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            animation: scan 3s linear infinite;
            opacity: 0.3;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div class="scan-line"></div>
        
        <div class="ui-overlay">
            <div class="header">
                <h1>3D 球体抽奖系统</h1>
                <p>高端可视化抽奖体验</p>
            </div>

            <div class="count-display">
                <div class="label">参与人数</div>
                <div class="number" id="count">0</div>
            </div>

            <div class="import-panel">
                <h3>导入名单</h3>
                <textarea id="nameList" placeholder="请输入名单，每行一个名字...&#10;&#10;示例：&#10;张三&#10;李四&#10;王五"></textarea>
                <div class="hint">提示：每行一个名字，支持中文和英文</div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 15px;" onclick="importNames()">导入名单</button>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="startBtn" onclick="startLottery()">开始抽奖</button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopLottery()" disabled>停止抽奖</button>
            </div>

            <div class="result-display" id="resultDisplay">
                <div class="winner-text">幸运中奖者</div>
                <div class="winner-name" id="winnerName"></div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const defaultNames = [
            '张三', '李四', '王五', '赵六', '钱七', '孙八', '周九', '吴十',
            '郑一', '王二', '刘三', '陈四', '杨五', '黄六', '赵七', '周八',
            '吴九', '郑十', '孙一', '钱二', '李三', '周四', '吴五', '郑六',
            '王七', '刘八', '陈九', '杨十', '黄一', '赵二', '周三', '吴四',
            '郑五', '孙六', '钱七', '李八', '周九', '吴十', '郑一', '王二',
            '刘三', '陈四', '杨五', '黄六', '赵七', '周八', '吴九', '郑十'
        ];

        let names = [...defaultNames];
        let isRunning = false;
        let selectedIndex = -1;

        // Three.js 变量
        let scene, camera, renderer, sphereGroup, particles;
        let rotationSpeed = 0.005;
        let targetRotationSpeed = 0.005;
        let fontSize = 16;

        function init() {
            const canvas = document.getElementById('canvas');
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            createSphere();
            createParticles();
            animate();

            document.getElementById('count').textContent = names.length;
        }

        function createSphere() {
            if (sphereGroup) {
                scene.remove(sphereGroup);
            }
            
            sphereGroup = new THREE.Group();
            
            const geometry = new THREE.SphereGeometry(1.5, 32, 32);
            const material = new THREE.MeshBasicMaterial({
                color: 0x1a1a2e,
                transparent: true,
                opacity: 0.1,
                wireframe: true
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphereGroup.add(sphere);

            const glowGeometry = new THREE.SphereGeometry(1.55, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.05
            });
            const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
            sphereGroup.add(glowSphere);

            updateNamesOnSphere();
            scene.add(sphereGroup);
        }

        function updateNamesOnSphere() {
            while (sphereGroup.children.length > 2) {
                sphereGroup.remove(sphereGroup.children[2]);
            }

            const sphereRadius = 1.5;
            const count = names.length;
            
            for (let i = 0; i < count; i++) {
                const phi = Math.acos(-1 + (2 * i) / count);
                const theta = Math.sqrt(count * Math.PI) * phi;

                const x = sphereRadius * Math.sin(phi) * Math.cos(theta);
                const y = sphereRadius * Math.sin(phi) * Math.sin(theta);
                const z = sphereRadius * Math.cos(phi);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 64;
                
                ctx.fillStyle = 'transparent';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, '#ff0080');
                gradient.addColorStop(0.5, '#00d4ff');
                gradient.addColorStop(1, '#7b2cbf');
                ctx.fillStyle = gradient;
                
                ctx.shadowColor = '#00d4ff';
                ctx.shadowBlur = 10;
                ctx.fillText(names[i], canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMaterial = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.9
                });
                
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.position.set(x, y, z);
                sprite.scale.set(0.3, 0.075, 1);
                
                sprite.userData = { index: i, name: names[i] };
                sphereGroup.add(sprite);
            }
        }

        function createParticles() {
            const particleCount = 2000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 10;
                positions[i3 + 1] = (Math.random() - 0.5) * 10;
                positions[i3 + 2] = (Math.random() - 0.5) * 10;

                colors[i3] = 0.0;
                colors[i3 + 1] = 0.83;
                colors[i3 + 2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.015,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (sphereGroup) {
                sphereGroup.rotation.y += rotationSpeed;
                sphereGroup.rotation.x += rotationSpeed * 0.3;
            }

            if (particles) {
                particles.rotation.y += 0.001;
            }

            rotationSpeed += (targetRotationSpeed - rotationSpeed) * 0.05;

            if (isRunning && sphereGroup) {
                const children = sphereGroup.children;
                for (let i = 2; i < children.length; i++) {
                    const sprite = children[i];
                    if (sprite.userData.index === selectedIndex) {
                        sprite.material.opacity = 1;
                        sprite.material.map = createHighlightTexture(names[selectedIndex]);
                    } else {
                        sprite.material.opacity = 0.6;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function createHighlightTexture(name) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            ctx.fillStyle = 'transparent';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `bold ${fontSize + 4}px 'Segoe UI', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ff0080');
            gradient.addColorStop(0.5, '#ffff00');
            gradient.addColorStop(1, '#00d4ff');
            ctx.fillStyle = gradient;
            
            ctx.shadowColor = '#ffff00';
            ctx.shadowBlur = 20;
            ctx.fillText(name, canvas.width / 2, canvas.height / 2);

            return new THREE.CanvasTexture(canvas);
        }

        function importNames() {
            const textarea = document.getElementById('nameList');
            const inputNames = textarea.value.trim().split('\n').filter(n => n.trim());
            
            if (inputNames.length > 0) {
                names = inputNames;
                document.getElementById('count').textContent = names.length;
                createSphere();
                selectedIndex = -1;
                
                const resultDisplay = document.getElementById('resultDisplay');
                resultDisplay.classList.remove('show');
            }
        }

        function startLottery() {
            if (names.length === 0) {
                alert('请先导入名单！');
                return;
            }

            isRunning = true;
            targetRotationSpeed = 0.03;
            selectedIndex = -1;

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            const resultDisplay = document.getElementById('resultDisplay');
            resultDisplay.classList.remove('show');
        }

        function stopLottery() {
            isRunning = false;
            targetRotationSpeed = 0.001;

            setTimeout(() => {
                selectedIndex = Math.floor(Math.random() * names.length);
                showWinner(names[selectedIndex]);
            }, 2000);

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function showWinner(name) {
            const resultDisplay = document.getElementById('resultDisplay');
            const winnerName = document.getElementById('winnerName');
            
            winnerName.textContent = name;
            resultDisplay.classList.add('show');
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 自动加载默认数据
        window.onload = () => {
            document.getElementById('nameList').value = defaultNames.join('\n');
            init();
        };
    </script>
</body>
</html>
